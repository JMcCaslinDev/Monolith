services:
  mariadb:
    image: mariadb:11
    ports:
      - "3306:3306"
    environment:
      MARIADB_DATABASE: monolith
      MARIADB_USER: monolith
      MARIADB_PASSWORD: monolith
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./database/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql:ro
      - ./database/migrations/002_role_permissions.sql:/docker-entrypoint-initdb.d/002_role_permissions.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:80"
    env_file: .env
    environment:
      DB_HOST: mariadb
    depends_on:
      mariadb:
        condition: service_healthy

volumes:
  mariadb_data:
